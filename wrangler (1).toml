name = "bwt-swimming"
main = "src/worker.js"
compatibility_date = "2024-01-01"
pages_build_output_dir = "public"

# KV Namespace for storing swimmer data
# Run: wrangler kv:namespace create SWIMMERS_KV
# Then paste the id below
[[kv_namespaces]]
binding = "SWIMMERS_KV"
id = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"

[site]
bucket = "./public"

[env.production]
name = "bwt-swimming-prod"
