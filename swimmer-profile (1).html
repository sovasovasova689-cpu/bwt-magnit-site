<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Профиль пловца — BWT Swimming</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bwt-blue: #005BAC;
    --bwt-blue-dark: #003F7D;
    --bwt-blue-light: #E6F1FB;
    --bwt-accent: #00A0E3;
    --text: #0A1628;
    --text-muted: #5A7189;
    --surface: #F4F8FD;
    --white: #ffffff;
    --border: rgba(0,91,172,0.12);
    --radius: 14px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: var(--surface); color: var(--text); min-height: 100vh; }

  /* HEADER */
  .profile-header {
    background: linear-gradient(135deg, var(--bwt-blue-dark) 0%, var(--bwt-blue) 60%, var(--bwt-accent) 100%);
    padding: 24px 40px 0;
    position: relative; overflow: hidden;
  }
  .profile-header::before {
    content: ''; position: absolute; top: -60px; right: -60px;
    width: 300px; height: 300px; border-radius: 50%;
    background: rgba(255,255,255,0.05);
  }
  .header-nav {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 40px; position: relative; z-index: 1;
  }
  .logo-link {
    display: flex; align-items: center; gap: 10px;
    text-decoration: none;
  }
  .logo-link img { height: 30px; filter: brightness(10); }
  .logo-text { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: white; letter-spacing: 2px; }
  .back-btn {
    color: rgba(255,255,255,0.8); text-decoration: none;
    font-size: 14px; font-weight: 500;
    display: flex; align-items: center; gap: 6px;
    padding: 8px 16px; border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.25);
    transition: all 0.2s;
  }
  .back-btn:hover { background: rgba(255,255,255,0.12); color: white; }

  /* PROFILE CARD */
  .profile-card-wrapper {
    position: relative; z-index: 1;
    padding: 0 40px;
  }
  .profile-card {
    background: white; border-radius: 20px 20px 0 0;
    padding: 36px; display: flex; align-items: flex-start; gap: 32px;
    box-shadow: 0 -4px 32px rgba(0,0,0,0.06);
  }
  .avatar {
    width: 100px; height: 100px; border-radius: 50%;
    background: linear-gradient(135deg, var(--bwt-blue) 0%, var(--bwt-accent) 100%);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue', sans-serif; font-size: 40px; color: white;
    flex-shrink: 0; border: 4px solid white;
    box-shadow: 0 4px 16px rgba(0,91,172,0.25);
  }
  .profile-info { flex: 1; }
  .swimmer-id {
    font-size: 11px; font-weight: 600; color: var(--bwt-blue);
    letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px;
  }
  .swimmer-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px; line-height: 1; color: var(--text); margin-bottom: 8px;
  }
  .swimmer-meta {
    display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 16px;
  }
  .meta-item { font-size: 14px; color: var(--text-muted); display: flex; align-items: center; gap: 5px; }
  .status-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: #E6F9F0; color: #1B7A4A;
    padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 600;
  }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #1B7A4A; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

  /* MAIN CONTENT */
  .main-content { background: var(--surface); padding: 24px 40px 60px; }
  .info-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 24px; margin-bottom: 24px; }
  .card {
    background: white; border-radius: var(--radius);
    border: 1px solid var(--border); padding: 28px;
  }
  .card-title {
    font-size: 13px; font-weight: 600; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 20px;
  }
  .info-rows { }
  .info-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 0; border-bottom: 1px solid rgba(0,91,172,0.06);
  }
  .info-row:last-child { border-bottom: none; }
  .info-key { font-size: 14px; color: var(--text-muted); }
  .info-val { font-size: 14px; font-weight: 500; color: var(--text); }

  /* STATS MINI */
  .mini-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .mini-stat {
    background: var(--bwt-blue-light); border-radius: 10px;
    padding: 16px; text-align: center;
  }
  .mini-stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 32px; color: var(--bwt-blue); line-height: 1; }
  .mini-stat-label { font-size: 12px; color: var(--text-muted); margin-top: 3px; }

  /* QR SECTION */
  .qr-section { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .qr-card { display: flex; flex-direction: column; align-items: center; text-align: center; }
  #profile-qr canvas, #profile-qr img { border-radius: 12px; border: 3px solid var(--bwt-blue-light); }
  .qr-caption { font-size: 13px; color: var(--text-muted); margin-top: 12px; }

  /* NOT FOUND */
  .not-found {
    text-align: center; padding: 100px 40px;
    display: flex; flex-direction: column; align-items: center; gap: 16px;
  }
  .not-found-icon { width: 80px; height: 80px; background: var(--bwt-blue-light); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
  .not-found-icon svg { width: 40px; height: 40px; fill: var(--bwt-blue); opacity: 0.5; }
  .not-found h2 { font-family: 'Bebas Neue', sans-serif; font-size: 36px; color: var(--text-muted); }
  .not-found p { font-size: 15px; color: var(--text-muted); }

  /* LOADING */
  .loading { text-align: center; padding: 80px; }
  .spinner {
    width: 44px; height: 44px; border: 3px solid var(--bwt-blue-light);
    border-top-color: var(--bwt-blue); border-radius: 50%;
    animation: spin 0.8s linear infinite; margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 768px) {
    .profile-header { padding: 20px 20px 0; }
    .profile-card-wrapper { padding: 0 20px; }
    .profile-card { flex-direction: column; gap: 20px; align-items: center; text-align: center; }
    .swimmer-meta { justify-content: center; }
    .main-content { padding: 20px 20px 40px; }
    .info-grid { grid-template-columns: 1fr; }
    .qr-section { grid-template-columns: 1fr; }
    .header-nav { flex-direction: column; gap: 12px; }
  }
</style>
</head>
<body>
<div class="profile-header">
  <div class="header-nav">
    <a href="/" class="logo-link">
      <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/8d/BWT_Logo.svg/1200px-BWT_Logo.svg.png" alt="BWT">
      <span class="logo-text" style="display:none;">BWT</span>
    </a>
    <a href="/" class="back-btn">← Главная</a>
  </div>
  <div class="profile-card-wrapper">
    <div class="profile-card" id="profile-card">
      <div class="loading">
        <div class="spinner"></div>
        <p style="color:var(--text-muted);">Загрузка профиля...</p>
      </div>
    </div>
  </div>
</div>

<div class="main-content" id="main-content" style="display:none;"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
function disciplineLabel(d) {
  const map = {
    freestyle: 'Вольный стиль', backstroke: 'На спине',
    breaststroke: 'Брасс', butterfly: 'Баттерфляй',
    medley: 'Комплексное плавание', 'open-water': 'Открытая вода'
  };
  return map[d] || d;
}
function rankLabel(r) {
  const map = {
    junior: 'Юниор', '3rd': '3-й разряд', '2nd': '2-й разряд',
    '1st': '1-й разряд', candidate: 'КМС', master: 'МС', imsc: 'МСМК'
  };
  return map[r] || r;
}
function getAge(birthDate) {
  const today = new Date();
  const birth = new Date(birthDate);
  let age = today.getFullYear() - birth.getFullYear();
  const m = today.getMonth() - birth.getMonth();
  if (m < 0 || (m === 0 && today.getDate() < birth.getDate())) age--;
  return age;
}
function formatDate(d) {
  return new Date(d).toLocaleDateString('ru-RU', { day: '2-digit', month: 'long', year: 'numeric' });
}
function genderLabel(g) { return g === 'male' ? 'Мужской' : 'Женский'; }

// Get swimmer ID from URL
const pathParts = window.location.pathname.split('/');
const swimmerId = pathParts[pathParts.length - 1] || pathParts[pathParts.length - 2];

// Load from localStorage
const swimmers = JSON.parse(localStorage.getItem('bwt_swimmers') || '[]');
const swimmer = swimmers.find(s => s.id === swimmerId);

const profileCard = document.getElementById('profile-card');
const mainContent = document.getElementById('main-content');

if (!swimmer) {
  profileCard.innerHTML = `
    <div class="not-found">
      <div class="not-found-icon"><svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg></div>
      <h2>Пловец не найден</h2>
      <p>ID: ${swimmerId}</p>
      <p>Профиль не существует или был удалён</p>
    </div>`;
} else {
  document.title = `${swimmer.firstName} ${swimmer.lastName} — BWT Swimming`;
  const initials = swimmer.firstName[0] + swimmer.lastName[0];
  const age = getAge(swimmer.birthDate);
  const registeredDate = formatDate(swimmer.registeredAt);

  profileCard.innerHTML = `
    <div class="avatar">${initials}</div>
    <div class="profile-info">
      <div class="swimmer-id">ID: ${swimmer.id}</div>
      <div class="swimmer-name">${swimmer.firstName} ${swimmer.lastName}</div>
      <div class="swimmer-meta">
        <span class="meta-item">📅 ${age} лет</span>
        <span class="meta-item">🏊 ${disciplineLabel(swimmer.discipline)}</span>
        <span class="meta-item">🏛️ ${swimmer.club}</span>
      </div>
      <div class="status-badge">
        <span class="status-dot"></span>
        Активный спортсмен
      </div>
    </div>
  `;

  mainContent.style.display = 'block';
  mainContent.innerHTML = `
    <div class="info-grid">
      <div class="card">
        <div class="card-title">Личные данные</div>
        <div class="info-rows">
          <div class="info-row">
            <span class="info-key">Полное имя</span>
            <span class="info-val">${swimmer.firstName} ${swimmer.lastName}</span>
          </div>
          <div class="info-row">
            <span class="info-key">Дата рождения</span>
            <span class="info-val">${formatDate(swimmer.birthDate)}</span>
          </div>
          <div class="info-row">
            <span class="info-key">Возраст</span>
            <span class="info-val">${age} лет</span>
          </div>
          <div class="info-row">
            <span class="info-key">Пол</span>
            <span class="info-val">${genderLabel(swimmer.gender)}</span>
          </div>
          <div class="info-row">
            <span class="info-key">Клуб</span>
            <span class="info-val">${swimmer.club}</span>
          </div>
          <div class="info-row">
            <span class="info-key">Дисциплина</span>
            <span class="info-val">${disciplineLabel(swimmer.discipline)}</span>
          </div>
          <div class="info-row">
            <span class="info-key">Разряд</span>
            <span class="info-val">${rankLabel(swimmer.rank)}</span>
          </div>
          ${swimmer.coach ? `<div class="info-row"><span class="info-key">Тренер</span><span class="info-val">${swimmer.coach}</span></div>` : ''}
          ${swimmer.email ? `<div class="info-row"><span class="info-key">Email</span><span class="info-val">${swimmer.email}</span></div>` : ''}
          <div class="info-row">
            <span class="info-key">Дата регистрации</span>
            <span class="info-val">${registeredDate}</span>
          </div>
        </div>
      </div>

      <div style="display:flex;flex-direction:column;gap:24px;">
        <div class="card">
          <div class="card-title">Статистика</div>
          <div class="mini-stats">
            <div class="mini-stat">
              <div class="mini-stat-num">${age}</div>
              <div class="mini-stat-label">Лет</div>
            </div>
            <div class="mini-stat">
              <div class="mini-stat-num">${rankLabel(swimmer.rank).substr(0,3)}</div>
              <div class="mini-stat-label">Разряд</div>
            </div>
          </div>
        </div>
        <div class="card">
          <div class="card-title">Верификация</div>
          <div style="display:flex;align-items:center;gap:8px;padding:12px 0;">
            <div style="width:32px;height:32px;background:#E6F9F0;border-radius:50%;display:flex;align-items:center;justify-content:center;">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="#1B7A4A"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
            </div>
            <div>
              <div style="font-size:13px;font-weight:600;color:#1B7A4A;">Верифицирован</div>
              <div style="font-size:12px;color:var(--text-muted);">BWT Swimming System</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="qr-section">
      <div class="card qr-card">
        <div class="card-title">QR-код спортсмена</div>
        <div id="profile-qr"></div>
        <div class="qr-caption">Отсканируйте для просмотра профиля</div>
        <div style="font-size:12px;color:var(--text-muted);margin-top:8px;word-break:break-all;">${window.location.href}</div>
      </div>
      <div class="card">
        <div class="card-title">О системе</div>
        <div style="font-size:14px;color:var(--text-muted);line-height:1.7;">
          <p style="margin-bottom:12px;">Этот QR-код связан с профилем спортсмена в системе BWT Swimming Management.</p>
          <p style="margin-bottom:12px;">При сканировании открывается данная страница с актуальной информацией о пловце.</p>
          <p>Код уникален и привязан к ID: <strong style="color:var(--bwt-blue);">${swimmer.id}</strong></p>
        </div>
        <div style="margin-top:24px;padding-top:20px;border-top:1px solid var(--border);display:flex;align-items:center;gap:12px;">
          <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/8d/BWT_Logo.svg/1200px-BWT_Logo.svg.png" style="height:24px;" onerror="this.style.display='none'">
          <span style="font-size:12px;color:var(--text-muted);">Best Water Technology</span>
        </div>
      </div>
    </div>
  `;

  // Generate QR
  setTimeout(() => {
    new QRCode(document.getElementById('profile-qr'), {
      text: window.location.href,
      width: 200, height: 200,
      colorDark: '#005BAC', colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.H
    });
  }, 100);
}
</script>
</body>
</html>
